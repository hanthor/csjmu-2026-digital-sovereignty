name: Build PDFs

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install fonts
        run: sudo apt-get install -y fonts-noto fonts-linuxlibertine

      - name: Setup Typst
        uses: typst-community/setup-typst@v4

      - name: Compile slides 4:3
        run: typst compile slides.typ slides-4-3.pdf

      - name: Compile slides 16:9
        run: typst compile slides-16-9.typ slides-16-9.pdf

      - name: Compile speaker script
        run: typst compile script.typ script.pdf

      - name: Upload PDFs
        uses: actions/upload-artifact@v4
        with:
          name: pdfs
          path: "*.pdf"
          retention-days: 30
