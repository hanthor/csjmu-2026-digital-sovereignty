name: Build PDFs

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install fonts
        run: sudo apt-get install -y fonts-linuxlibertine

      - name: Setup Typst
        uses: typst-community/setup-typst@v4

      - name: Compile slides 4:3 light
        run: typst compile slides.typ slides-4-3.pdf

      - name: Compile slides 16:9 light
        run: typst compile slides-16-9.typ slides-16-9.pdf

      - name: Compile slides 4:3 dark
        run: typst compile slides-dark.typ slides-dark-4-3.pdf

      - name: Compile slides 16:9 dark
        run: typst compile slides-dark-16-9.typ slides-dark-16-9.pdf

      - name: Compile speaker script
        run: typst compile script.typ script.pdf

      - name: Build HTML slideshow
        run: python3 build-html.py slides-16-9.typ slides.html

      - name: Build HTML script
        run: python3 build-html.py script.typ script.html --mode document

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Build PPTX
        run: uv run build-pptx.py slides-16-9.typ slides.pptx

      - name: Upload PDFs as artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pdfs
          path: "*.pdf"
          retention-days: 30

      # Commit PDFs back to repo on pushes to main so README links stay current
      - name: Commit compiled PDFs
        if: github.event_name == 'push'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add slides-4-3.pdf slides-16-9.pdf slides-dark-4-3.pdf slides-dark-16-9.pdf script.pdf slides.html script.html slides.pptx
          git diff --staged --quiet || git commit -m "chore: update compiled PDFs [skip ci]"
          git push
