name: Build PDFs

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install fonts
        run: sudo apt-get install -y fonts-linuxlibertine

      - name: Setup Typst
        uses: typst-community/setup-typst@v4

      - name: Compile slides 4:3
        run: typst compile slides.typ slides-4-3.pdf

      - name: Compile slides 16:9
        run: typst compile slides-16-9.typ slides-16-9.pdf

      - name: Compile speaker script
        run: typst compile script.typ script.pdf

      - name: Upload PDFs as artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pdfs
          path: "*.pdf"
          retention-days: 30

      # Commit PDFs back to repo on pushes to main so README links stay current
      - name: Commit compiled PDFs
        if: github.event_name == 'push'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add slides-4-3.pdf slides-16-9.pdf script.pdf
          git diff --staged --quiet || git commit -m "chore: update compiled PDFs [skip ci]"
          git push
